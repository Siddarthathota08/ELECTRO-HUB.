<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign Up • ElectroHub</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <header class="header"><div class="container nav">
  <a class="brand" href="index.html"><span class="logo"></span> ElectroHub</a>
  <nav class="navlinks">
    <a href="products.html">Products</a>
    <a href="categories.html">Categories</a>
    <a href="wishlist.html">Wishlist <span class="badge wish">0</span></a>
    <a href="cart.html">Cart <span class="badge cart">0</span></a>
    <a href="orders.html">Orders</a>
    <a href="profile.html"><span class="user-name">Guest</span></a>
  </nav>
</div></header>
  <main class="container">
<section class="section card" style="max-width:520px; margin:24px auto">
  <h2>Create account</h2>
  <input class="input" id="name" placeholder="Full Name">
  <input class="input" id="email" placeholder="Email">
  <button class="btn" id="signupBtn">Create</button>
  <div class="small">Already have an account? <a href="login.html">Sign in</a>.</div>
</section>
<script>
document.getElementById('signupBtn').onclick = ()=>{
  const u = { email: document.getElementById('email').value.trim(), name: document.getElementById('name').value.trim()||'Guest' };
  localStorage.setItem('eh_user', JSON.stringify(u));
  location.href='profile.html';
};
</script>
</main>
  <footer class="footer">
  <div class="container">
    <div class="row"><strong>ElectroHub</strong><span class="small">• Demo frontend (HTML/CSS/JS only)</span><span class="right small">© 2025</span></div>
    <div class="small">Local demo using localStorage. Customize freely.</div>
  </div>
</footer>
</body>
</html>
