<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Orders • ElectroHub</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <header class="header"><div class="container nav">
  <a class="brand" href="index.html"><span class="logo"></span> ElectroHub</a>
  <nav class="navlinks">
    <a href="products.html">Products</a>
    <a href="categories.html">Categories</a>
    <a href="wishlist.html">Wishlist <span class="badge wish">0</span></a>
    <a href="cart.html">Cart <span class="badge cart">0</span></a>
    <a href="orders.html">Orders</a>
    <a href="profile.html"><span class="user-name">Guest</span></a>
  </nav>
</div></header>
  <main class="container">
<section class="section">
  <h2>Orders</h2>
  <div id="olist"></div>
</section>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const orders = JSON.parse(localStorage.getItem('eh_orders')||'[]');
  if(orders.length===0){ olist.innerHTML = '<div class="notice">No orders yet.</div>'; return; }
  olist.innerHTML = orders.map(o=>`<div class="card">
    <div class="row"><div>Order <span class="kbd">${o.id}</span></div><div class="right small">${new Date(o.at).toLocaleString()}</div></div>
    ${o.items.map(i=>`<div class="row small"><span>${i.name} × ${i.qty}</span><span class="right">${App.fmt(i.line)}</span></div>`).join('')}
  </div>`).join('');
});
</script>
</main>
  <footer class="footer">
  <div class="container">
    <div class="row"><strong>ElectroHub</strong><span class="small">• Demo frontend (HTML/CSS/JS only)</span><span class="right small">© 2025</span></div>
    <div class="small">Local demo using localStorage. Customize freely.</div>
  </div>
</footer>
</body>
</html>
