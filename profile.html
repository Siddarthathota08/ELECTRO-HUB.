<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Profile • ElectroHub</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <header class="header"><div class="container nav">
  <a class="brand" href="index.html"><span class="logo"></span> ElectroHub</a>
  <nav class="navlinks">
    <a href="products.html">Products</a>
    <a href="categories.html">Categories</a>
    <a href="wishlist.html">Wishlist <span class="badge wish">0</span></a>
    <a href="cart.html">Cart <span class="badge cart">0</span></a>
    <a href="orders.html">Orders</a>
    <a href="profile.html"><span class="user-name">Guest</span></a>
  </nav>
</div></header>
  <main class="container">
<section class="section">
  <h2>Your Profile</h2>
  <div class="card" id="prof"></div>
  <div class="row" style="margin-top:10px">
    <a class="btn" href="orders.html">Your Orders</a>
    <button class="btn ghost" id="logout">Log out</button>
  </div>
</section>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const u = JSON.parse(localStorage.getItem('eh_user')||'{}');
  if(!u.email){ prof.innerHTML = '<div class="notice">You are not signed in. <a href="login.html">Sign in</a></div>'; return; }
  prof.innerHTML = `<div><div><strong>Name:</strong> ${u.name||'-'}</div><div><strong>Email:</strong> ${u.email}</div></div>`;
  logout.onclick = ()=>{ localStorage.removeItem('eh_user'); location.reload(); };
});
</script>
</main>
  <footer class="footer">
  <div class="container">
    <div class="row"><strong>ElectroHub</strong><span class="small">• Demo frontend (HTML/CSS/JS only)</span><span class="right small">© 2025</span></div>
    <div class="small">Local demo using localStorage. Customize freely.</div>
  </div>
</footer>
</body>
</html>
