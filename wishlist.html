<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const list = App.wishlist();
  if(list.length===0){ wgrid.outerHTML = '<div class="notice">Nothing saved yet.</div>'; return; }
  App.renderProducts('#wgrid', list);
});
</script>
